<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #16324f; }
      .label { font-size: 22px; font-weight: 700; fill: #16324f; }
      .body { font-size: 18px; fill: #294661; }
      .small { font-size: 16px; fill: #4a6782; }
      .box { stroke: #24507a; stroke-width: 2.5; rx: 18; ry: 18; }
      .line { stroke: #24507a; stroke-width: 3; stroke-linecap: round; fill: none; }
      .dash { stroke-dasharray: 10 8; }
      .arrow { fill: #24507a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f7fbff"/>
  <text x="700" y="60" text-anchor="middle" class="title">Hermes Agent Architecture Overview</text>

  <rect x="60" y="120" width="250" height="170" class="box" fill="#e6f4ff"/>
  <text x="185" y="165" text-anchor="middle" class="label">CLI / TUI</text>
  <text x="185" y="202" text-anchor="middle" class="body">interactive chat</text>
  <text x="185" y="232" text-anchor="middle" class="body">slash commands</text>
  <text x="185" y="262" text-anchor="middle" class="small">local terminal surface</text>

  <rect x="60" y="330" width="250" height="210" class="box" fill="#eef8ec"/>
  <text x="185" y="375" text-anchor="middle" class="label">Messaging Gateway</text>
  <text x="185" y="412" text-anchor="middle" class="body">Telegram / Discord</text>
  <text x="185" y="442" text-anchor="middle" class="body">Slack / WhatsApp / Matrix</text>
  <text x="185" y="472" text-anchor="middle" class="body">Email / SMS / WeCom ...</text>
  <text x="185" y="512" text-anchor="middle" class="small">long-lived multi-platform ingress</text>

  <rect x="60" y="585" width="250" height="155" class="box" fill="#f4ecff"/>
  <text x="185" y="630" text-anchor="middle" class="label">ACP / API / Cron</text>
  <text x="185" y="665" text-anchor="middle" class="body">editor integration</text>
  <text x="185" y="695" text-anchor="middle" class="body">OpenAI-compatible API</text>
  <text x="185" y="725" text-anchor="middle" class="small">scheduled runs and IDE surfaces</text>

  <rect x="370" y="110" width="660" height="665" class="box" fill="#fff6db"/>
  <text x="700" y="155" text-anchor="middle" class="label">Hermes Core Runtime</text>
  <text x="700" y="188" text-anchor="middle" class="body">one agent core shared by CLI, gateway, ACP,</text>
  <text x="700" y="214" text-anchor="middle" class="body">cron, API server, and research environments</text>

  <rect x="430" y="235" width="540" height="140" class="box" fill="#ffffff"/>
  <text x="700" y="280" text-anchor="middle" class="label">AIAgent</text>
  <text x="700" y="312" text-anchor="middle" class="body">run_conversation() -> model call</text>
  <text x="700" y="338" text-anchor="middle" class="body">-> tool call loop -> final response</text>
  <text x="700" y="362" text-anchor="middle" class="small">provider routing, interruption, retries,</text>
  <text x="700" y="384" text-anchor="middle" class="small">compression, persistence</text>

  <rect x="430" y="410" width="250" height="130" class="box" fill="#eafbea"/>
  <text x="555" y="452" text-anchor="middle" class="label">Prompt System</text>
  <text x="555" y="485" text-anchor="middle" class="small">SOUL / context files</text>
  <text x="555" y="510" text-anchor="middle" class="small">memory snapshot / skills index</text>

  <rect x="720" y="410" width="250" height="130" class="box" fill="#eaf0ff"/>
  <text x="845" y="452" text-anchor="middle" class="label">Tool Runtime</text>
  <text x="845" y="485" text-anchor="middle" class="small">registry / toolsets / MCP</text>
  <text x="845" y="510" text-anchor="middle" class="small">sequential or concurrent dispatch</text>

  <rect x="430" y="575" width="250" height="150" class="box" fill="#fff"/>
  <text x="555" y="620" text-anchor="middle" class="label">Session State</text>
  <text x="555" y="653" text-anchor="middle" class="small">state.db + FTS5</text>
  <text x="555" y="678" text-anchor="middle" class="small">titles / lineage / usage</text>

  <rect x="720" y="575" width="250" height="150" class="box" fill="#fff"/>
  <text x="845" y="620" text-anchor="middle" class="label">Persistent Memory</text>
  <text x="845" y="653" text-anchor="middle" class="small">MEMORY.md / USER.md</text>
  <text x="845" y="678" text-anchor="middle" class="small">skills / Honcho / cron state</text>

  <rect x="1090" y="120" width="250" height="170" class="box" fill="#fcebea"/>
  <text x="1215" y="165" text-anchor="middle" class="label">Model Providers</text>
  <text x="1215" y="202" text-anchor="middle" class="body">OpenAI / Anthropic</text>
  <text x="1215" y="232" text-anchor="middle" class="body">Nous / OpenRouter / HF</text>
  <text x="1215" y="262" text-anchor="middle" class="small">plus direct custom endpoints</text>

  <rect x="1090" y="345" width="250" height="205" class="box" fill="#eef6ee"/>
  <text x="1215" y="390" text-anchor="middle" class="label">Execution Backends</text>
  <text x="1215" y="425" text-anchor="middle" class="body">local / docker / ssh</text>
  <text x="1215" y="455" text-anchor="middle" class="body">singularity / modal</text>
  <text x="1215" y="485" text-anchor="middle" class="body">daytona</text>
  <text x="1215" y="522" text-anchor="middle" class="small">terminal environments</text>
  <text x="1215" y="545" text-anchor="middle" class="small">and isolation</text>

  <rect x="1090" y="600" width="250" height="140" class="box" fill="#f4ecff"/>
  <text x="1215" y="645" text-anchor="middle" class="label">Research Layer</text>
  <text x="1215" y="680" text-anchor="middle" class="body">benchmarks / trajectories</text>
  <text x="1215" y="710" text-anchor="middle" class="small">Atropos integration</text>

  <path class="line" d="M 310 205 L 422 280"/>
  <polygon class="arrow" points="422,280 410,273 413,287"/>
  <path class="line" d="M 310 435 L 422 315"/>
  <polygon class="arrow" points="422,315 410,320 419,330"/>
  <path class="line" d="M 310 662 L 422 332"/>
  <polygon class="arrow" points="422,332 412,340 425,344"/>

  <path class="line" d="M 970 305 L 1082 205"/>
  <polygon class="arrow" points="1082,205 1069,210 1077,220"/>
  <path class="line" d="M 970 470 L 1082 447"/>
  <polygon class="arrow" points="1082,447 1069,442 1072,456"/>
  <path class="line dash" d="M 970 650 L 1082 670"/>
  <polygon class="arrow" points="1082,670 1070,663 1068,677"/>

  <path class="line" d="M 680 305 L 720 305"/>
  <polygon class="arrow" points="720,305 708,299 708,311"/>
  <path class="line" d="M 700 375 L 700 402"/>
  <polygon class="arrow" points="700,402 694,390 706,390"/>
  <path class="line" d="M 555 540 L 555 567"/>
  <polygon class="arrow" points="555,567 549,555 561,555"/>
  <path class="line" d="M 845 540 L 845 567"/>
  <polygon class="arrow" points="845,567 839,555 851,555"/>

  <text x="700" y="825" text-anchor="middle" class="small">Hermes is best understood as a multi-surface agent control plane:</text>
  <text x="700" y="850" text-anchor="middle" class="small">many entry surfaces feed one AIAgent core that coordinates prompt assembly,</text>
  <text x="700" y="875" text-anchor="middle" class="small">tool execution, session persistence, memory systems, and optional research/training infrastructure.</text>
</svg>
