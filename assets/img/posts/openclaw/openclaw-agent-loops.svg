<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1180" viewBox="0 0 800 1180">
  <defs>
    <style>
      text { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title  { font-size: 22px; font-weight: 700; fill: #16324f; }
      .tag    { font-size: 12px; font-weight: 700; fill: #fff; }
      .bhead  { font-size: 15px; font-weight: 600; fill: #16324f; }
      .bsub   { font-size: 12px; fill: #38556f; }
      .albl   { font-size: 12px; fill: #38556f; }
      .rlbl   { font-size: 12px; fill: #c0392b; }
      .note   { font-size: 11px; fill: #888; }
      .rtitle { font-size: 13px; font-weight: 600; fill: #c0392b; }
      .ritem  { font-size: 12px; fill: #7b2020; }
    </style>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#24507a"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="1180" rx="10" fill="#f7fbff" stroke="none" stroke-width="2"/>
  <text x="400" y="48" text-anchor="middle" class="title">OpenClaw Agent Loops</text>
  <rect x="18" y="68" width="764" height="824" rx="16" fill="#fff8e1" stroke="#f0a500" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="34" y="58" width="252" height="22" rx="6" fill="#f0a500" stroke="none" stroke-width="2"/>
  <text x="160" y="73" text-anchor="middle" class="tag">外层循环：OpenClaw agentCommand</text>
  <rect x="46" y="390" width="708" height="472" rx="14" fill="#eafbea" stroke="#27ae60" stroke-width="2"/>
  <rect x="62" y="380" width="242" height="22" rx="6" fill="#27ae60" stroke="none" stroke-width="2"/>
  <text x="183" y="395" text-anchor="middle" class="tag">内层循环：pi-agent-core 推理循环</text>
  <rect x="260" y="90" width="280" height="56" rx="10" fill="#e6f4ff" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="112" text-anchor="middle" class="bhead">消息进入</text>
  <text x="400" y="130" text-anchor="middle" class="bsub">Channel → Gateway → RPC</text>
  <rect x="260" y="178" width="280" height="56" rx="10" fill="#e6f4ff" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" class="bhead">解析 &amp; 准备</text>
  <text x="400" y="218" text-anchor="middle" class="bsub">模型 / 认证 / Skills / 系统提示</text>
  <rect x="260" y="266" width="240" height="90" rx="10" fill="#fff0b3" stroke="#f0a500" stroke-width="2"/>
  <text x="380" y="290" text-anchor="middle" class="bhead">runWithModelFallback</text>
  <text x="380" y="310" text-anchor="middle" class="bsub">包裹每次 pi 调用</text>
  <text x="380" y="328" text-anchor="middle" class="bsub">FailoverError → 换模型重试</text>
  <text x="380" y="346" text-anchor="middle" class="bsub">fallbackAttemptIndex 计数</text>
  <rect x="530" y="266" width="180" height="90" rx="10" fill="#e6f4ff" stroke="#24507a" stroke-width="2"/>
  <text x="620" y="292" text-anchor="middle" class="bhead">消息返回</text>
  <text x="620" y="312" text-anchor="middle" class="bsub">result.payloads</text>
  <text x="620" y="330" text-anchor="middle" class="bsub">→ Channel</text>
  <text x="620" y="348" text-anchor="middle" class="bsub">→ 用户 / IDE</text>
  <rect x="260" y="412" width="280" height="52" rx="10" fill="#ffffff" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="432" text-anchor="middle" class="bhead">createAgentSession</text>
  <text x="400" y="450" text-anchor="middle" class="bsub">初始化 session + 注入工具</text>
  <rect x="260" y="496" width="280" height="52" rx="10" fill="#ffffff" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="516" text-anchor="middle" class="bhead">session.prompt()</text>
  <text x="400" y="534" text-anchor="middle" class="bsub">发送消息给 LLM</text>
  <rect x="260" y="580" width="280" height="52" rx="10" fill="#f4ecff" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="600" text-anchor="middle" class="bhead">LLM 推理</text>
  <text x="400" y="618" text-anchor="middle" class="bsub">流式输出 / 思考 / 事件订阅运行</text>
  <rect x="80" y="652" width="180" height="52" rx="10" fill="#eef6ee" stroke="#24507a" stroke-width="2"/>
  <text x="170" y="672" text-anchor="middle" class="bhead">工具执行</text>
  <text x="170" y="690" text-anchor="middle" class="bsub">exec / read / edit / write / …</text>
  <rect x="260" y="796" width="280" height="52" rx="10" fill="#ffffff" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="816" text-anchor="middle" class="bhead">最终回复</text>
  <text x="400" y="834" text-anchor="middle" class="bsub">result.payloads 返回外层</text>
  <line x1="400" y1="146" x2="400" y2="170" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="400" y1="234" x2="400" y2="258" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="400" y1="356" x2="400" y2="404" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <rect x="412" y="374" width="48" height="14" fill="#f7fbff"/>
<text x="416" y="384" text-anchor="left" class="albl">调用 pi</text>
  <line x1="400" y1="464" x2="400" y2="488" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="400" y1="548" x2="400" y2="572" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <line x1="400" y1="632" x2="400" y2="654" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <polygon points="400,654 460,678 400,702 340,678" fill="#fffbe6" stroke="#24507a" stroke-width="2"/>
  <text x="400" y="683" text-anchor="middle" class="bsub">tool_use?</text>
  <line x1="340" y1="678" x2="262" y2="678" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <rect x="290" y="662" width="20" height="14" fill="#f7fbff"/>
<text x="300" y="672" text-anchor="middle" class="albl">是</text>
<polyline points="80,678 60,678 60,522 260,522" fill="none" stroke="#24507a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#a)"/>
  <text x="40" y="610" text-anchor="middle" class="albl" transform="rotate(-90,40,610)">工具结果 → 再次调用 LLM</text>
  <line x1="400" y1="702" x2="400" y2="788" stroke="#24507a" stroke-width="2" stroke-linecap="round" marker-end="url(#a)"/>
  <rect x="412" y="712" width="16" height="14" fill="#f7fbff"/>
<text x="416" y="722" text-anchor="left" class="albl">否</text>
  <polyline points="540,822 740,822 740,311 712,311" fill="none" stroke="#24507a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#a)"/>
  <text x="730" y="572" text-anchor="middle" class="albl" transform="rotate(90,730,572)">result.payloads 返回</text>
  <rect x="46" y="900" width="708" height="100" rx="10" fill="#fcebea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="400" y="922" text-anchor="middle" class="rtitle">重试触发条件（外层循环重新调用 pi）</text>
  <text x="66" y="944" text-anchor="start" class="ritem">① FailoverError：认证失败 / 限流 / 超时 → 换模型 / provider 重试</text>
  <text x="66" y="962" text-anchor="start" class="ritem">② 压缩后重试：上下文窗口溢出，压缩完成后重新调用 pi</text>
  <text x="66" y="980" text-anchor="start" class="ritem">③ 思考级别降级：xhigh → high → off，降级后重试</text>
  <line x1="400" y1="848" x2="400" y2="900" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" marker-end="url(#ar)"/>
  <rect x="412" y="868" width="32" height="14" fill="#f7fbff"/>
<text x="416" y="878" text-anchor="left" class="rlbl">出错时</text>
<polyline points="46,950 28,950 28,322 260,322" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar)"/>
  <text x="18" y="640" text-anchor="middle" class="rlbl" transform="rotate(-90,18,640)">重新调用 pi</text>
  <rect x="46" y="1018" width="708" height="56" rx="10" fill="#eef4fb" stroke="#24507a" stroke-width="1.5"/>
  <text x="400" y="1036" text-anchor="middle" class="bhead">图例</text>
  <line x1="66" y1="1056" x2="116" y2="1056" stroke="#24507a" stroke-width="2" marker-end="url(#a)"/>
  <text x="124" y="1061" text-anchor="start" class="bsub">正常流程</text>
  <line x1="240" y1="1056" x2="290" y2="1056" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <text x="298" y="1061" text-anchor="start" class="rlbl">异常重试</text>
  <rect x="420" y="1046" width="12" height="12" rx="3" fill="#fff8e1" stroke="#f0a500" stroke-width="1.5"/>
  <text x="438" y="1058" text-anchor="start" class="bsub">外层循环</text>
  <rect x="540" y="1046" width="12" height="12" rx="3" fill="#eafbea" stroke="#27ae60" stroke-width="1.5"/>
  <text x="558" y="1058" text-anchor="start" class="bsub">内层循环</text>
  <text x="400" y="1162" text-anchor="middle" class="note">正常情况下 pi 只被调用一次；仅在 FailoverError / 压缩 / 思考级别降级时，外层循环才重新调用 pi。</text>
</svg>