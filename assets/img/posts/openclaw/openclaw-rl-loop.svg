<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 34px sans-serif; fill: #17324f; }
      .label { font: 600 22px sans-serif; fill: #17324f; }
      .body { font: 400 18px sans-serif; fill: #2f4b65; }
      .small { font: 400 16px sans-serif; fill: #44617a; }
      .box { stroke: #25557d; stroke-width: 2.5; rx: 18; ry: 18; }
      .line { stroke: #25557d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#25557d"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#fbfcfe"/>
  <text x="700" y="60" text-anchor="middle" class="title">OpenClaw-RL Training Loop</text>

  <rect x="70" y="150" width="250" height="140" class="box" fill="#e6f4ff"/>
  <text x="195" y="198" text-anchor="middle" class="label">Live Usage</text>
  <text x="195" y="234" text-anchor="middle" class="body">user chat / terminal / GUI</text>
  <text x="195" y="266" text-anchor="middle" class="body">SWE / tool calls</text>

  <rect x="390" y="120" width="290" height="190" class="box" fill="#eef8ec"/>
  <text x="535" y="170" text-anchor="middle" class="label">Agent Serving</text>
  <text x="535" y="206" text-anchor="middle" class="body">OpenClaw runtime or agent</text>
  <text x="535" y="238" text-anchor="middle" class="body">collects trajectories</text>
  <text x="535" y="270" text-anchor="middle" class="small">actions + next-state signals</text>

  <rect x="760" y="120" width="280" height="190" class="box" fill="#fff6db"/>
  <text x="900" y="170" text-anchor="middle" class="label">PRM / Judge</text>
  <text x="900" y="206" text-anchor="middle" class="body">score next state</text>
  <text x="900" y="238" text-anchor="middle" class="body">or extract hindsight signal</text>
  <text x="900" y="270" text-anchor="middle" class="small">reward + critique generation</text>

  <rect x="1110" y="120" width="220" height="190" class="box" fill="#fcebea"/>
  <text x="1220" y="170" text-anchor="middle" class="label">Optimization</text>
  <text x="1220" y="206" text-anchor="middle" class="body">Binary RL</text>
  <text x="1220" y="238" text-anchor="middle" class="body">OPD</text>
  <text x="1220" y="270" text-anchor="middle" class="body">Combination</text>

  <rect x="470" y="430" width="460" height="170" class="box" fill="#f2edff"/>
  <text x="700" y="480" text-anchor="middle" class="label">Policy Training (asynchronous)</text>
  <text x="700" y="516" text-anchor="middle" class="body">update model / LoRA / checkpoint</text>
  <text x="700" y="548" text-anchor="middle" class="body">serve via OpenAI-compatible API</text>

  <rect x="540" y="670" width="320" height="90" class="box" fill="#ffffff"/>
  <text x="700" y="722" text-anchor="middle" class="body">deployed back into OpenClaw</text>

  <path class="line" d="M 320 220 L 390 220"/>
  <path class="line" d="M 680 220 L 760 220"/>
  <path class="line" d="M 1040 220 L 1110 220"/>
  <path class="line" d="M 1220 310 L 1220 360 L 930 360 L 930 430"/>
  <path class="line" d="M 700 600 L 700 670"/>
  <path class="line dashed" d="M 540 715 L 260 715 L 260 290"/>
  <path class="line dashed" d="M 860 715 L 1240 715 L 1240 310"/>

  <text x="190" y="340" text-anchor="middle" class="small">real environment feedback</text>
  <text x="1040" y="390" text-anchor="middle" class="small">fully asynchronous loop</text>
  <text x="700" y="785" text-anchor="middle" class="small">Summary from OpenClaw-RL paper and repo: interaction traces produce next-state signals that drive judge-based RL or on-policy distillation,</text>
  <text x="700" y="807" text-anchor="middle" class="small">and the updated policy is served back into the live agent without stopping usage.</text>
</svg>
